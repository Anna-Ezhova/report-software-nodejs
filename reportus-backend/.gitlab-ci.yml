stages:
  - build

image: docker:latest

before_script:
  - docker info

build:
  stage: build
  script:
    - docker login -u $HARBOR_USERNAME -p $HARBOR_PASSWORD $HARBOR_URL
    - docker buildx build --platform "linux/amd64" --tag registry.rosselhome.de/asofnet_entwickler/reportus-backend:v1.0 --push .
